name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.0.2). Leave blank to upload artifacts only — nothing is published."
        required: false
        default: ""
      body:
        description: "Release notes in Markdown. Leave blank to auto-generate from commits since the last tag."
        required: false
        default: ""
      prerelease:
        description: "Mark this release as pre-release (won't show up in the in-app update check)"
        required: false
        type: boolean
        default: false

# tauri-action needs write access to create the release + push the tag
permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release notes
    if: inputs.version != ''
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compose release notes
        id: notes
        env:
          USER_BODY: ${{ inputs.body }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOTES_FILE=$(mktemp)
          if [ -n "$USER_BODY" ]; then
            printf '%s\n' "$USER_BODY" > "$NOTES_FILE"
          else
            LAST_TAG=$(git tag --sort=-v:refname | head -1 || true)
            if [ -z "$LAST_TAG" ]; then
              CHANGES=$(git log --pretty=format:'- %s (%h)' --no-merges --reverse)
              COMPARE="https://github.com/${REPO}/commits/${VERSION}"
            else
              CHANGES=$(git log "$LAST_TAG..HEAD" --pretty=format:'- %s (%h)' --no-merges --reverse || true)
              COMPARE="https://github.com/${REPO}/compare/${LAST_TAG}...${VERSION}"
            fi
            if [ -z "$CHANGES" ]; then
              CHANGES="_No commits since the previous release._"
            fi
            printf "## What's Changed\n\n" > "$NOTES_FILE"
            printf '%s\n\n' "$CHANGES" >> "$NOTES_FILE"
            printf '**Full Changelog**: %s\n' "$COMPARE" >> "$NOTES_FILE"
          fi
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            cat "$NOTES_FILE"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.label }}
    needs: [prepare-release]
    if: ${{ always() && (needs.prepare-release.result == 'skipped' || needs.prepare-release.result == 'success') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
          - label: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
          - label: Windows x64
            os: windows-latest
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: "Lens ${{ inputs.version }}"
          releaseBody: ${{ needs.prepare-release.outputs.notes }}
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Upload artifacts (no release)
        if: inputs.version == ''
        uses: actions/upload-artifact@v4
        with:
          name: lens-${{ matrix.label }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
